<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        input, select, button {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Temperature Converter</h1>
        <form action="/" method="post">
            <input type="number" step="any" name="temperature" placeholder="Enter temperature" required value="{{ temperature if temperature is not none else '' }}">
            <select name="unit">
                <option value="celsius" {% if unit == 'celsius' %}selected{% endif %}>Celsius (°C)</option>
                <option value="fahrenheit" {% if unit == 'fahrenheit' %}selected{% endif %}>Fahrenheit (°F)</option>
            </select>
            <button type="submit">Convert</button>
        </form>
        {% if output %}
            <h2>{{ output }}</h2>
        {% endif %}
    </div>
</body>
</html>
